name: matter_home
description: "A minimal Flutter app mimicking the Google Home Sample App for Matter Android."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  mobile_scanner: ^5.2.3
  uuid: ^4.5.1
  go_router: ^14.6.2

  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
